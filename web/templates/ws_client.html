{{define "content"}}
<h2 class="text-2xl font-bold mb-6">{{call .t "ws_client.title"}}</h2>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Connection -->
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">{{call .t "ws_client.label.url"}}</label>
                <input type="text" id="ws-url" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-gray-100 focus:border-emerald-400 focus:outline-none" placeholder="ws://example.com/ws">
            </div>
            <div class="flex gap-2">
                <button onclick="connectWS()" id="btn-connect" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded font-medium transition">{{call .t "ws_client.action.connect"}}</button>
                <button onclick="disconnectWS()" id="btn-disconnect" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded font-medium transition hidden">{{call .t "ws_client.action.disconnect"}}</button>
                <span id="ws-status" class="flex items-center px-3 text-sm text-gray-400">{{call .t "ws_client.status.disconnected"}}</span>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">{{call .t "ws_client.label.message"}}</label>
                <textarea id="ws-message" rows="4" data-json-editor data-json-key="ws_message" data-json-allow-empty="false" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-gray-100 focus:border-emerald-400 focus:outline-none font-mono text-sm" placeholder='{"action": "ping"}'></textarea>
            </div>
            <button onclick="sendMessage()" id="btn-send" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-medium transition w-full" disabled>{{call .t "ws_client.action.send"}}</button>
        </div>
    </div>

    <!-- Messages -->
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">{{call .t "ws_client.messages.title"}}</h3>
            <button onclick="clearMessages()" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">{{call .t "ws_client.messages.clear"}}</button>
        </div>
        <div id="ws-messages" class="space-y-2 max-h-[500px] overflow-y-auto font-mono text-sm">
            <p class="text-gray-500">{{call .t "ws_client.messages.empty"}}</p>
        </div>
    </div>
</div>

<script>
let ws = null;
let reconnectTimer = null;
let reconnectAttempts = 0;
let shouldStayConnected = false;
let manualDisconnectRequested = false;
const recentSentMessages = [];
const RECENT_SENT_WINDOW_MS = 4000;
const MAX_RECENT_SENT_MESSAGES = 20;
const WS_STORAGE_URL_KEY = 'inspector.wsClient.url';
const WS_STORAGE_KEEP_CONNECTED_KEY = 'inspector.wsClient.keepConnected';

const wsURLField = document.getElementById('ws-url');
const wsStatusField = document.getElementById('ws-status');
const wsConnectButton = document.getElementById('btn-connect');
const wsDisconnectButton = document.getElementById('btn-disconnect');
const wsMessageField = document.getElementById('ws-message');
const wsSendButton = document.getElementById('btn-send');

const wsI18n = {
    statusConnected: '{{call .t "ws_client.status.connected"}}',
    statusConnecting: '{{call .t "ws_client.status.connecting"}}',
    statusReconnecting: '{{call .t "ws_client.status.reconnecting"}}',
    statusDisconnected: '{{call .t "ws_client.status.disconnected"}}',
    statusError: '{{call .t "ws_client.status.error"}}',
    reconnectInPrefix: '{{call .t "ws_client.reconnect.in_prefix"}}',
    reconnectInSuffix: '{{call .t "ws_client.reconnect.in_suffix"}}',
    lostRetryingPrefix: '{{call .t "ws_client.reconnect.lost_retrying_prefix"}}',
    connectedToPrefix: '{{call .t "ws_client.system.connected_to"}}',
    reconnectedToPrefix: '{{call .t "ws_client.system.reconnected_to"}}',
    connectionClosed: '{{call .t "ws_client.system.connection_closed"}}',
    missingURL: '{{call .t "ws_client.error.missing_url"}}',
    missingURLTitle: '{{call .t "ws_client.error.missing_url_title"}}',
    connectFailedPrefix: '{{call .t "ws_client.error.connect_failed_prefix"}}',
    wsErrorOccurred: '{{call .t "ws_client.error.ws_error"}}',
    sendFailedPrefix: '{{call .t "ws_client.error.send_failed_prefix"}}',
    msgFieldUnavailable: '{{call .t "ws_client.validation.field_unavailable"}}',
    msgEmpty: '{{call .t "ws_client.validation.message_empty"}}',
    msgInvalidJSON: '{{call .t "ws_client.validation.message_invalid_json"}}',
    msgInvalidShort: '{{call .t "ws_client.validation.message_invalid_short"}}',
    validationTitle: '{{call .t "ws_client.validation.title"}}',
    messagesCleared: '{{call .t "ws_client.messages.cleared"}}',
    labelSent: '{{call .t "ws_client.stream.sent"}}',
    labelReceived: '{{call .t "ws_client.stream.received"}}',
    labelEcho: '{{call .t "ws_client.stream.echo"}}',
    labelSystem: '{{call .t "ws_client.stream.system"}}',
    labelError: '{{call .t "ws_client.stream.error"}}'
};

if (window.jsonEditorTools) {
    window.jsonEditorTools.init(document);
}

if (wsMessageField) {
    wsMessageField.addEventListener('input', syncSendButtonState);
}

function readStorage(key) {
    try {
        return localStorage.getItem(key) || '';
    } catch (_) {
        return '';
    }
}

function writeStorage(key, value) {
    try {
        localStorage.setItem(key, value);
    } catch (_) {}
}

function setShouldStayConnected(value) {
    shouldStayConnected = !!value;
    writeStorage(WS_STORAGE_KEEP_CONNECTED_KEY, shouldStayConnected ? '1' : '0');
}

function setStatus(text, tone) {
    if (!wsStatusField) return;

    const toneClass = {
        connected: 'text-emerald-400',
        connecting: 'text-yellow-300',
        error: 'text-red-300',
        disconnected: 'text-gray-400'
    };

    wsStatusField.textContent = text;
    wsStatusField.className = 'flex items-center px-3 text-sm ' + (toneClass[tone] || toneClass.disconnected);
}

function setConnectedUI(isConnected) {
    if (wsConnectButton) wsConnectButton.classList.toggle('hidden', !!isConnected);
    if (wsDisconnectButton) wsDisconnectButton.classList.toggle('hidden', !isConnected);
}

function clearReconnectTimer() {
    if (!reconnectTimer) return;
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
}

function toStableJSON(value) {
    if (Array.isArray(value)) {
        return value.map(toStableJSON);
    }
    if (value && typeof value === 'object') {
        const normalized = {};
        Object.keys(value).sort().forEach(function(key) {
            normalized[key] = toStableJSON(value[key]);
        });
        return normalized;
    }
    return value;
}

function buildPayloadSignatures(text) {
    const raw = String(text || '');
    const trimmed = raw.trim();
    if (!trimmed) return [];

    const signatures = ['raw:' + trimmed];
    try {
        const parsed = JSON.parse(trimmed);
        signatures.push('json:' + JSON.stringify(toStableJSON(parsed)));
    } catch (_) {}

    return signatures;
}

function hasAnySharedSignature(left, right) {
    if (!Array.isArray(left) || !Array.isArray(right) || left.length === 0 || right.length === 0) {
        return false;
    }
    const rightSet = new Set(right);
    return left.some(function(item) {
        return rightSet.has(item);
    });
}

function rememberSentMessage(text) {
    const signatures = buildPayloadSignatures(text);
    if (signatures.length === 0) return;

    const now = Date.now();
    recentSentMessages.push({ signatures: signatures, at: now });

    while (recentSentMessages.length > MAX_RECENT_SENT_MESSAGES) {
        recentSentMessages.shift();
    }

    for (let i = recentSentMessages.length - 1; i >= 0; i--) {
        if (now - recentSentMessages[i].at > RECENT_SENT_WINDOW_MS) {
            recentSentMessages.splice(i, 1);
        }
    }
}

function isLikelyEchoMessage(text) {
    const incomingSignatures = buildPayloadSignatures(text);
    if (incomingSignatures.length === 0) return false;

    const now = Date.now();
    for (let i = recentSentMessages.length - 1; i >= 0; i--) {
        const item = recentSentMessages[i];
        if (now - item.at > RECENT_SENT_WINDOW_MS) {
            recentSentMessages.splice(i, 1);
            continue;
        }
        if (hasAnySharedSignature(item.signatures, incomingSignatures)) {
            // Consume the matched sent payload once to avoid marking later real messages as echo.
            recentSentMessages.splice(i, 1);
            return true;
        }
    }
    return false;
}

function scheduleReconnect(url) {
    if (!shouldStayConnected || reconnectTimer) return;

    reconnectAttempts += 1;
    const delayMs = Math.min(15000, 1000 * Math.pow(2, reconnectAttempts - 1));
    const seconds = Math.ceil(delayMs / 1000);

    setStatus(wsI18n.reconnectInPrefix + seconds + wsI18n.reconnectInSuffix, 'connecting');
    addMessage('system', wsI18n.lostRetryingPrefix + seconds + wsI18n.reconnectInSuffix);

    reconnectTimer = setTimeout(function() {
        reconnectTimer = null;
        connectWS({ url: url, isReconnect: true, silent: true });
    }, delayMs);
}

function validateWSMessage(showAlert) {
    if (!wsMessageField) {
        return { ok: false, message: wsI18n.msgFieldUnavailable };
    }

    let result;
    if (window.jsonEditorTools && typeof window.jsonEditorTools.validateField === 'function') {
        result = window.jsonEditorTools.validateField(wsMessageField, {
            allowEmpty: false,
            requireObject: false,
            emptyMessage: wsI18n.msgEmpty,
            invalidJSONMessage: wsI18n.msgInvalidJSON
        });
    } else {
        const raw = String(wsMessageField.value || '').trim();
        if (!raw) {
            result = { ok: false, message: wsI18n.msgEmpty };
        } else {
            try {
                JSON.parse(raw);
                result = { ok: true };
            } catch (_) {
                result = { ok: false, message: wsI18n.msgInvalidJSON };
            }
        }
    }

    if (showAlert && !result.ok) {
        window.appAlert(result.message || wsI18n.msgInvalidShort, wsI18n.validationTitle);
        if (window.jsonEditorTools && typeof window.jsonEditorTools.focusField === 'function') {
            window.jsonEditorTools.focusField(wsMessageField);
        } else {
            wsMessageField.focus();
        }
    }

    return result;
}

function syncSendButtonState() {
    if (!wsSendButton) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        wsSendButton.disabled = true;
        return;
    }
    const validation = validateWSMessage(false);
    wsSendButton.disabled = !validation.ok;
}

function connectWS(options) {
    const opts = options || {};
    const url = String(opts.url || (wsURLField ? wsURLField.value : '') || '').trim();
    if (!url) {
        if (!opts.silent) {
            window.appAlert(wsI18n.missingURL, wsI18n.missingURLTitle);
        }
        return;
    }

    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        return;
    }

    if (wsURLField) wsURLField.value = url;
    writeStorage(WS_STORAGE_URL_KEY, url);
    setShouldStayConnected(true);
    manualDisconnectRequested = false;
    clearReconnectTimer();
    setStatus(opts.isReconnect ? wsI18n.statusReconnecting : wsI18n.statusConnecting, 'connecting');
    setConnectedUI(false);

    // Connect through our proxy
    const proxyUrl = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}/send/ws-proxy?url=${encodeURIComponent(url)}`;
    
    try {
        ws = new WebSocket(proxyUrl);
    } catch(e) {
        addMessage('error', wsI18n.connectFailedPrefix + e.message);
        setStatus(wsI18n.statusError, 'error');
        if (shouldStayConnected) {
            scheduleReconnect(url);
        }
        return;
    }

    ws.onopen = function() {
        reconnectAttempts = 0;
        setStatus(wsI18n.statusConnected, 'connected');
        setConnectedUI(true);
        syncSendButtonState();
        addMessage('system', opts.isReconnect ? (wsI18n.reconnectedToPrefix + url) : (wsI18n.connectedToPrefix + url));
    };

    ws.onmessage = function(event) {
        const payload = String(event.data || '');
        if (isLikelyEchoMessage(payload)) {
            addMessage('echo', payload);
            return;
        }
        addMessage('received', payload);
    };

    ws.onclose = function() {
        const wasManual = manualDisconnectRequested;
        manualDisconnectRequested = false;
        ws = null;
        setConnectedUI(false);
        syncSendButtonState();

        if (wasManual || !shouldStayConnected) {
            setStatus(wsI18n.statusDisconnected, 'disconnected');
            addMessage('system', wsI18n.connectionClosed);
            return;
        }

        scheduleReconnect(url);
    };

    ws.onerror = function() {
        addMessage('error', wsI18n.wsErrorOccurred);
        setStatus(wsI18n.statusError, 'error');
    };
}

function disconnectWS() {
    setShouldStayConnected(false);
    manualDisconnectRequested = true;
    clearReconnectTimer();

    if (ws) {
        ws.close();
        return;
    }

    setStatus(wsI18n.statusDisconnected, 'disconnected');
    setConnectedUI(false);
    syncSendButtonState();
}

function sendMessage() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const validation = validateWSMessage(true);
    if (!validation.ok) return;

    const msg = window.jsonEditorTools && wsMessageField
        ? window.jsonEditorTools.getValue(wsMessageField)
        : document.getElementById('ws-message').value;
    if (!msg || !msg.trim()) return;

    try {
        ws.send(msg);
    } catch (e) {
        addMessage('error', wsI18n.sendFailedPrefix + e.message);
        return;
    }

    rememberSentMessage(msg);
    addMessage('sent', msg);
    if (window.jsonEditorTools && wsMessageField) {
        window.jsonEditorTools.setValue(wsMessageField, '');
    } else {
        document.getElementById('ws-message').value = '';
    }
    syncSendButtonState();
}

function addMessage(type, text) {
    const container = document.getElementById('ws-messages');
    if (container.querySelector('.text-gray-500')) container.innerHTML = '';

    const colors = {
        sent: 'text-blue-300 border-blue-800',
        received: 'text-emerald-300 border-emerald-800',
        echo: 'text-amber-300 border-amber-800',
        system: 'text-gray-400 border-gray-700',
        error: 'text-red-300 border-red-800'
    };
    const labels = {
        sent: wsI18n.labelSent,
        received: wsI18n.labelReceived,
        echo: wsI18n.labelEcho,
        system: wsI18n.labelSystem,
        error: wsI18n.labelError
    };

    const div = document.createElement('div');
    div.className = `border-l-2 pl-3 py-1 ${colors[type]} fade-in`;
    div.innerHTML = `<span class="text-xs opacity-60">${labels[type]} ${new Date().toLocaleTimeString()}</span><pre class="mt-1 whitespace-pre-wrap break-all">${escapeHtml(text)}</pre>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function clearMessages() {
    document.getElementById('ws-messages').innerHTML = '<p class="text-gray-500">' + wsI18n.messagesCleared + '</p>';
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function restoreConnectionPreference() {
    const savedURL = readStorage(WS_STORAGE_URL_KEY);
    if (wsURLField && savedURL && !wsURLField.value.trim()) {
        wsURLField.value = savedURL;
    }

    shouldStayConnected = readStorage(WS_STORAGE_KEEP_CONNECTED_KEY) === '1';
    if (shouldStayConnected && savedURL) {
        connectWS({ url: savedURL, isReconnect: true, silent: true });
    } else {
        setStatus(wsI18n.statusDisconnected, 'disconnected');
        setConnectedUI(false);
    }
}

syncSendButtonState();
restoreConnectionPreference();
</script>
{{end}}
